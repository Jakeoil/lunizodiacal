<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Analemma Icon</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #555;
      color: #eee;
      font-family: 'Courier New', monospace;
      padding: 2rem;
    }
    h1 { font-size: 1.3rem; margin-bottom: 1.5rem; }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      align-items: end;
    }
    .icon-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .icon-box img {
      display: block;
      border: 1px solid #777;
    }
    .label {
      font-size: 0.8rem;
      color: #aaa;
    }
    .versions {
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
    .versions a {
      color: #8cf;
      text-decoration: none;
    }
    .versions a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Analemma Icon — Standard Sizes</h1>
  <p class="versions">Versions:
    <a href="#" onclick="setSrc('analemma.svg'); return false"><b>current</b></a> |
    <a href="#" onclick="setSrc('analemma.v1.svg'); return false">v1</a> |
    <a href="#" onclick="setSrc('analemma.v2.svg'); return false">v2</a> |
    <a href="#" onclick="setSrc('analemma.v3.svg'); return false">v3</a>
  </p>
  <div class="grid">
    <div class="icon-box">
      <img src="analemma.svg" width="16" height="16">
      <span class="label">16 &times; 16</span>
    </div>
    <div class="icon-box">
      <img src="analemma.svg" width="32" height="32">
      <span class="label">32 &times; 32</span>
    </div>
    <div class="icon-box">
      <img src="analemma.svg" width="48" height="48">
      <span class="label">48 &times; 48</span>
    </div>
    <div class="icon-box">
      <img src="analemma.svg" width="64" height="64">
      <span class="label">64 &times; 64</span>
    </div>
    <div class="icon-box">
      <img src="analemma.svg" width="96" height="96">
      <span class="label">96 &times; 96</span>
    </div>
    <div class="icon-box">
      <img src="analemma.svg" width="128" height="128">
      <span class="label">128 &times; 128</span>
    </div>
    <div class="icon-box">
      <img src="analemma.svg" width="192" height="192">
      <span class="label">192 &times; 192</span>
    </div>
    <div class="icon-box">
      <img src="analemma.svg" width="256" height="256">
      <span class="label">256 &times; 256</span>
    </div>
    <div class="icon-box">
      <img src="analemma.svg" width="600" height="600">
      <span class="label">600 &times; 600 (native)</span>
    </div>
  </div>
  <script>
    function setSrc(file) {
      document.querySelectorAll('.grid img').forEach(img => img.src = file);
    }
  </script>
</body>
</html>
